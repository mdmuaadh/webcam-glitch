<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcam Glitch Mirror</title>
  <style>
    body {
      background: #181a1b;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #f8f8f8;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 3vh;
    }
    video, canvas {
      border: 4px solid #444;
      border-radius: 12px;
      background: #000;
      box-shadow: 0 4px 24px #000b;
      max-width: 90vw;
      max-height: 70vh;
      margin-bottom: 1.5rem;
      transition: box-shadow 0.3s;
    }
    h1 {
      font-weight: 600;
      margin-bottom: 1.5rem;
      letter-spacing: 0.03em;
    }
    .info {
      margin-bottom: 1.5rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Webcam Mirror Glitch</h1>
    <div class="info">Live mirrored webcam. After 5 seconds: GLITCH!</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none"></canvas>
  </div>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let stream = null;
    let glitchTimeout = null;

    // Start webcam
    async function startWebcam() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          video.play();
          requestAnimationFrame(drawMirror);
        };
        // Start glitch timer
        glitchTimeout = setTimeout(applyGlitch, 5000);
      } catch (e) {
        alert('Could not access webcam: ' + e.message);
      }
    }

    // Draw mirrored video
    function drawMirror() {
      if (video.paused || video.ended) return;
      if (canvas.style.display === 'none') {
        ctx.save();
        ctx.setTransform(-1, 0, 0, 1, video.videoWidth, 0); // Mirror horizontally
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
        ctx.restore();
        requestAnimationFrame(drawMirror);
      }
    }

    // Glitch effect: shift red channel horizontally
    function applyGlitch() {
      // Set canvas size to video size
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      // Draw mirrored frame
      ctx.save();
      ctx.setTransform(-1, 0, 0, 1, video.videoWidth, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
      ctx.restore();
      // Get image data
      let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let data = imageData.data;
      const width = canvas.width;
      const height = canvas.height;
      const shift = Math.floor(width * 0.03) || 2; // shift by ~3% of width
      // Shift red channel right
      for (let y = 0; y < height; y++) {
        for (let x = width - 1; x >= shift; x--) {
          let idx = (y * width + x) * 4;
          let srcIdx = (y * width + (x - shift)) * 4;
          data[idx] = data[srcIdx]; // Red channel
        }
      }
      ctx.putImageData(imageData, 0, 0);
      // Hide video, show glitched canvas
      video.style.display = 'none';
      canvas.style.display = '';
      // Stop webcam
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    }

    // Set canvas size to match video
    video.addEventListener('loadeddata', () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
    });

    startWebcam();
  </script>
</body>
</html>
